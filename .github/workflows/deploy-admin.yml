# =====================================================================
# 管理コンソール (ynmo-admin) → Azure App Service デプロイ
#
# - main ブランチへの push で自動実行
# - Node 20 で npm ci → npm run build (Next.js)
# - .next / public / package.json / package-lock.json / next.config.ts /
#   node_modules を artifact 化して Azure に upload
# - 起動コマンドは Azure 側で `npm run start` を設定する想定
# =====================================================================
name: Build and deploy ynmo-admin to Azure Web App - tech0-gen-11-step4-node-10

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Prepare deployment package
        run: |
          mkdir -p deploy
          cp -r .next deploy/
          cp -r public deploy/
          cp -r node_modules deploy/
          cp package.json package-lock.json next.config.ts deploy/

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy
          # node_modules を含む大きい artifact を圧縮する
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'tech0-gen-11-step4-node-10'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_ADMIN }}
