# =====================================================================
# 管理コンソール (ynmo-admin) → Azure App Service デプロイ
#
# 配信戦略：Next.js standalone 出力
#   - .next/standalone/ に server.js + tracing された最小 node_modules が入る
#   - そこに .next/static/ と public/ をコピーして自己完結バンドルにする
#   - 巨大な node_modules を artifact として持ち回らないので symlink 破損が起きない
#   - Azure 側の起動コマンドは「node server.js」を設定する
# =====================================================================
name: Build and deploy ynmo-admin to Azure Web App - tech0-gen-11-step4-node-10

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js (standalone)
        run: npm run build

      - name: Assemble standalone bundle
        run: |
          # standalone は .next/static / public を内包しないので明示的に組み込む
          cp -r .next/static .next/standalone/.next/
          cp -r public .next/standalone/

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .next/standalone
          if-no-files-found: error
          # 隠しファイル（.env など）はそもそも standalone に含めない設計だが念のため
          include-hidden-files: false

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'tech0-gen-11-step4-node-10'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_ADMIN }}
